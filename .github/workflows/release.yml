name: desktop-release

# Cross-platform Tauri release pipeline.
#
# Triggered automatically on every push to main (version read from
# src-tauri/tauri.conf.json) or on an explicit v* tag push.
#
# Produces a GitHub Release with:
#   • macOS .dmg + .app.tar.gz + .sig (Apple Silicon and Intel)
#   • Windows .msi/.exe + .sig
#   • A `latest.json` manifest signed with TAURI_SIGNING_PRIVATE_KEY,
#     which the Tauri updater fetches via the endpoint configured in
#     src-tauri/tauri.conf.json (-> plugins.updater.endpoints[0]).
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           # base64 from `npx tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  # the passphrase you set on the key
#
# Optional (for macOS notarization):
#   APPLE_CERTIFICATE                   # base64 .p12
#   APPLE_CERTIFICATE_PASSWORD
#   APPLE_SIGNING_IDENTITY              # "Developer ID Application: Name (TEAMID)"
#   APPLE_ID
#   APPLE_PASSWORD                      # app-specific password
#   APPLE_TEAM_ID

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve the release tag ──────────────────────────────────────────────
  # On a branch push the tag is derived from tauri.conf.json (e.g. v0.2.0).
  # On a tag push the pushed tag is used as-is.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building release ${TAG}"

  # ── Build binaries (matrix: macOS arm64, macOS x64, Windows) ────────────
  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch ygo-shared submodule
        shell: bash
        env:
          GITLAB_DEPLOY_USER: ${{ secrets.GITLAB_DEPLOY_USER }}
          GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}
        run: |
          set -e
          echo "Cloning ygo-shared..."
          rm -rf ygo-shared
          git clone --depth 1 --verbose \
            "https://${GITLAB_DEPLOY_USER}:${GITLAB_DEPLOY_TOKEN}@gitlab.com/codex-thesaurus/arcanaygo/ygo-shared.git" \
            ygo-shared
          echo "ygo-shared cloned successfully"
          ls -la ygo-shared/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: "cargo-deps"
          cache-on-failure: true

      - run: npm ci

      - name: Set production API URL
        shell: bash
        run: |
          echo "VITE_API_BASE_URL=https://arcana-ygo.taild2a523.ts.net/api" > .env.production
          cat .env.production

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: 'YGO Collection ${{ needs.prepare.outputs.tag }}'
          releaseBody: |
            Téléchargements automatiques.

            * **macOS (Apple Silicon)** — `*_aarch64.dmg`
            * **macOS (Intel)** — `*_x64.dmg`
            * **Windows** — `*_x64-setup.exe` ou `.msi`

            Les utilisateurs déjà installés recevront cette version via le
            bouton « Vérifier les mises à jour » (Tauri updater + `latest.json`).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          toolchain: stable
