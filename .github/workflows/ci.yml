name: desktop-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch ygo-shared submodule
        env:
          GITLAB_DEPLOY_USER: ${{ secrets.GITLAB_DEPLOY_USER }}
          GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}
        run: |
          rm -rf ygo-shared
          git clone --depth 1 \
            "https://${GITLAB_DEPLOY_USER}:${GITLAB_DEPLOY_TOKEN}@gitlab.com/codex-thesaurus/arcanaygo/ygo-shared.git" \
            ygo-shared
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: cargo check
        working-directory: src-tauri
        run: cargo check
