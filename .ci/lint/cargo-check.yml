lint:cargo-check:
  image: rust:${RUST_VERSION}
  stage: lint
  cache:
    key: { files: [src-tauri/Cargo.lock] }
    paths: [src-tauri/target/, .cargo/registry/]
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
  before_script:
    - apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev
  script:
    - cd src-tauri && cargo check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
